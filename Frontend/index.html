<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Task Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>Ashish's Task Manager</h1>
      <p class="subtitle">Keep track of your tasks easily Kaam Easy</p>
    </header>

    <div class="add-task-section">
      <h2>Add New Task</h2>
      <form id="taskForm">
        <div class="form-row">
          <input type="text" id="taskTitle" placeholder="Task title *" maxlength="80" />
          <select id="taskPriority">
            <option value="low">Low Priority</option>
            <option value="medium" selected>Medium Priority</option>
            <option value="high">High Priority</option>
          </select>
        </div>
        <textarea id="taskDesc" placeholder="Short description (optional)" rows="2"></textarea>
        <button type="submit" id="addBtn">Add Task</button>
      </form>
      <p id="formMsg" class="form-msg"></p>
    </div>

    <div class="filters">
      <label>Filter by status:</label>
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
      </select>

      <label>Priority:</label>
      <select id="priorityFilter">
        <option value="all">All</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      <button id="applyFilter">Apply</button>
    </div>

    <div id="taskList" class="task-list">
      <p class="loading-txt">Loading tasks...</p>
    </div>

  </div>

  <script src="..backend/script.js"></script>
</body>
</html>
